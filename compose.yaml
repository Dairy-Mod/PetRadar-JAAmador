services:

  postgres:
    image: postgis/postgis:16-master
    container_name: PostgresDB
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=petradardb
    volumes:
      - postgresdb_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: RedisCache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data


volumes:
  postgresdb_data:
  redis_data:
